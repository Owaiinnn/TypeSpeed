<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4fc1ff"/>
      <stop offset="100%" style="stop-color:#38b6ff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>

  <!-- Keyboard base -->
  <rect x="32" y="120" width="192" height="100" rx="12" fill="#2a2d3e" stroke="#4fc1ff" stroke-width="2" opacity="0.9"/>

  <!-- Key row 1 -->
  <rect x="44" y="132" width="24" height="20" rx="4" fill="#3a3d4e"/>
  <rect x="72" y="132" width="24" height="20" rx="4" fill="#3a3d4e"/>
  <rect x="100" y="132" width="24" height="20" rx="4" fill="#4fc1ff"/>
  <rect x="128" y="132" width="24" height="20" rx="4" fill="#3a3d4e"/>
  <rect x="156" y="132" width="24" height="20" rx="4" fill="#3a3d4e"/>
  <rect x="184" y="132" width="24" height="20" rx="4" fill="#3a3d4e"/>

  <!-- Key row 2 -->
  <rect x="50" y="156" width="24" height="20" rx="4" fill="#3a3d4e"/>
  <rect x="78" y="156" width="24" height="20" rx="4" fill="#3a3d4e"/>
  <rect x="106" y="156" width="24" height="20" rx="4" fill="#3a3d4e"/>
  <rect x="134" y="156" width="24" height="20" rx="4" fill="#4fc1ff"/>
  <rect x="162" y="156" width="24" height="20" rx="4" fill="#3a3d4e"/>
  <rect x="190" y="156" width="18" height="20" rx="4" fill="#3a3d4e"/>

  <!-- Spacebar -->
  <rect x="72" y="180" width="112" height="20" rx="4" fill="#3a3d4e"/>

  <!-- Speed lines -->
  <line x1="48" y1="72" x2="88" y2="72" stroke="#4fc1ff" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="40" y1="84" x2="96" y2="84" stroke="#4fc1ff" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <line x1="52" y1="96" x2="84" y2="96" stroke="#4fc1ff" stroke-width="3" stroke-linecap="round" opacity="0.2"/>

  <!-- WPM text -->
  <text x="168" y="88" font-family="monospace, Consolas, 'Courier New'" font-size="36" font-weight="bold" fill="#4fc1ff" text-anchor="middle">WPM</text>

  <!-- Cursor blink -->
  <rect x="140" y="44" width="3" height="28" fill="#4fc1ff" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
